name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Run tests with coverage
        run: pytest --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=85 -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: coverage.xml
          retention-days: 14

  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

      - name: Build
        run: npm run build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t delphi-call-graph-analyzer:ci .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 8000:8000 delphi-call-graph-analyzer:ci
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          docker stop test-container
          docker rm test-container
